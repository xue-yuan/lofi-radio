name: YouTube Link Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health check
        run: node scripts/check-links.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update broken youtube links"
          title: "🚨 Health Check: Broken YouTube Links Detected"
          body-path: reports/broken-links-report.md
          branch: youtube-health-check
          delete-branch: true
          labels: |
            automated
            maintenance
