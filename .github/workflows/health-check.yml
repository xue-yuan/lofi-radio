name: YouTube Link Health Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run health check
        run: node scripts/check-links.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update broken youtube links"
          title: "🚨 Health Check: Broken YouTube Links Detected"
          body-path: reports/broken-links-report.md
          branch: youtube-health-check
          delete-branch: true
          labels: |
            automated
            maintenance
